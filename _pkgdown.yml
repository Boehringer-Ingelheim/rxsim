url: https://boehringer-ingelheim.github.io/rxsim
template:
  bootstrap: 5
  includes:
    in_header: |
      <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
      <script>document.addEventListener("DOMContentLoaded", function(){ mermaid.initialize({ startOnLoad: true }); });</script>

navbar:
  structure:
    left: [intro, articles, reference]

articles:
  - title: "Getting started"
    navbar: ~
    contents:
      - getting-started

  - title: "Architecture"
    navbar: Architecture
    contents:
      - concepts

  - title: "Class reference"
    navbar: Classes
    contents:
      - class-population
      - class-timer
      - class-condition
      - class-trial

  - title: "How-to guides"
    navbar: How-to
    contents:
      - api-styles
      - endpoints
      - enrollment-dropout
      - interims

  - title: "Examples"
    navbar: Examples
    contents:
      - example-1
      - example-2
      - example-3
      - example-4
      - example-5
      - example-6
      - example-7
      - example-8
      - example-multi-run

reference:
  - title: "Core classes"
    desc: "R6 classes that form the simulation building blocks"
    contents:
      - Condition
      - Timer
      - Trial
      - Population

  - title: "Trial construction helpers"
    desc: "Functions to build and replicate trials"
    contents:
      - replicate_trial
      - clone_trial
      - run_trials

  - title: "Timer helpers"
    desc: "Helpers for building Timer timepoint lists"
    contents:
      - add_timepoints
      - gen_timepoints

  - title: "Condition helpers"
    desc: "Convenience constructors for Condition objects"
    contents:
      - trigger_primitives
      - trigger_by_calendar
      - trigger_by_fraction

  - title: "Population helpers"
    desc: "Helpers for building Population generators"
    contents:
      - gen_population
      - gen_plan

  - title: "Results helpers"
    desc: "Functions to collect and display simulation results"
    contents:
      - collect_results
      - prettify_results

  - title: "Utilities"
    contents:
      - get_col_names
      - vector_to_dataframe

